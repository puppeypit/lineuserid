<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนเจ้าหน้าที่ สอ.กวก.</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { 
      font-family: 'Kanit', sans-serif; 
      background-color: #f0f9ff;
      background-image: radial-gradient(#e0f2fe 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .minimal-card {
      background: #ffffff;
      border: 2px solid #f1f5f9;
      border-radius: 40px;
      box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.05);
    }

    /* --- Focus Effects --- */
    .input-pill {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0.65rem 1.25rem;
      background-color: #f8fafc;
      border: 2px solid #f1f5f9;
      border-radius: 9999px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-pill:focus-within {
      border-color: #38bdf8;
      background-color: #ffffff;
      box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.15);
      transform: translateY(-2px);
    }

    .input-pill i { transition: all 0.3s ease; }
    .input-pill:focus-within i { color: #0ea5e9; transform: scale(1.15); }
    .input-pill input:disabled { background-color: transparent; cursor: not-allowed; opacity: 0.6; }

    /* --- Dept Selection Grid --- */
    .dept-checkbox:checked + label {
      background: linear-gradient(135deg, #38bdf8, #10b981);
      color: white;
      border-color: transparent;
      transform: scale(1.05);
      box-shadow: 0 5px 12px rgba(56, 189, 248, 0.3);
    }

    .dept-label {
      cursor: pointer;
      border: 2px solid #f1f5f9;
      font-size: 0.75rem;
      padding: 0.6rem 0.25rem;
      text-align: center;
      border-radius: 15px;
      background-color: #fff;
      color: #64748b;
      font-weight: 500;
      transition: all 0.2s ease;
      display: block;
    }

    .dept-checkbox { display: none; }

    .btn-submit {
      background: linear-gradient(to right, #0ea5e9, #10b981);
      transition: all 0.3s ease;
    }
    .btn-submit:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
    }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* โปรไฟล์ LINE */
    .line-profile-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: none;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <div class="minimal-card w-full max-w-2xl p-8 md:p-12 my-4">
    
    <div class="flex flex-col md:flex-row items-center gap-6 mb-8 border-b border-slate-50 pb-8 text-center md:text-left relative">
      <div class="relative shrink-0">
        <div class="p-1 bg-gradient-to-tr from-sky-400 to-emerald-400 rounded-full shadow-md" id="imgWrapper">
          <img src="https://cdn-icons-png.flaticon.com/512/4333/4333609.png" id="defaultIcon" class="w-20 h-20 rounded-full object-cover border-4 border-white">
          <img id="profileImage" class="line-profile-img absolute top-1 left-1">
        </div>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-slate-700">ลงทะเบียนเจ้าหน้าที่ สอ.กวก.</h2>
        <p id="displayName" class="text-slate-400 font-medium text-sm mt-1">กำลังเชื่อมต่อระบบ...</p>
      </div>
    </div>

    <form id="regForm" onsubmit="submitForm(event)" class="space-y-6">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex items-center gap-3">
          <label class="w-16 text-sm font-semibold text-slate-500">ชื่อจริง</label>
          <div class="input-pill">
            <i class="fa-regular fa-face-smile text-sky-300 mr-3"></i>
            <input type="text" id="name" required placeholder="ระบุชื่อจริง" disabled class="bg-transparent w-full outline-none text-sm text-slate-600">
          </div>
        </div>
        <div class="flex items-center gap-3">
          <label class="w-16 md:w-14 text-sm font-semibold text-slate-500">นามสกุล</label>
          <div class="input-pill">
            <i class="fa-regular fa-star text-sky-300 mr-3"></i>
            <input type="text" id="surname" required placeholder="ระบุนามสกุล" disabled class="bg-transparent w-full outline-none text-sm text-slate-600">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex items-center gap-3">
          <label class="w-16 text-sm font-semibold text-slate-500">โทรศัพท์</label>
          <div class="input-pill">
            <i class="fa-solid fa-phone text-sky-300 mr-3"></i>
            <input type="tel" id="phone" required placeholder="08XXXXXXXX" maxlength="10" disabled class="bg-transparent w-full outline-none text-sm text-slate-600">
          </div>
        </div>
        <div class="flex items-center gap-3">
          <label class="w-16 md:w-14 text-sm font-semibold text-slate-500">Pass</label>
          <div class="input-pill">
            <i class="fa-solid fa-lock text-sky-300 mr-3"></i>
            <input type="password" id="password" required placeholder="Password" disabled class="bg-transparent w-full outline-none text-sm text-slate-600">
          </div>
        </div>
      </div>

      <div class="pt-4 border-t border-slate-50 mt-4">
        <div class="flex flex-col md:flex-row gap-4">
          <label class="w-full md:w-16 text-sm font-semibold text-slate-500 md:mt-2">ฝ่าย</label>
          <div class="flex-1">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
              <script>
                const depts = ["ฝ่ายอำนวยการ", "สินเชื่อ", "การเงิน", "บัญชี", "สมาชิกสัมพันธ์", "สารสนเทศ", "ผู้ช่วยผู้จัดการ", "ผู้จัดการ"];
                depts.forEach((dept, index) => {
                  document.write(`
                    <div>
                      <input type="checkbox" id="dept_${index}" value="${dept}" class="dept-checkbox" onclick="onlyOne(this)" disabled>
                      <label for="dept_${index}" class="dept-label shadow-sm">${dept}</label>
                    </div>
                  `);
                });
              </script>
            </div>
          </div>
        </div>
      </div>

      <div class="pt-6">
        <button type="submit" id="submitBtn" disabled 
                class="btn-submit w-full text-white font-bold py-4 rounded-full text-lg shadow-lg flex items-center justify-center gap-2">
          <span>ยืนยันข้อมูลเจ้าหน้าที่</span>
          <i class="fa-solid fa-check-circle"></i>
        </button>
      </div>

      <div class="pt-8 border-t border-slate-50 text-center">
        <p class="text-[11px] text-slate-400 font-medium tracking-wide uppercase">
          2026 ฝ่ายสารสนเทศ | สหกรณ์ออมทรัพย์กรมวิชาการเกษตรจำกัด
        </p>
      </div>

    </form>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    let lineProfile = {};
    const LIFF_ID = "2009229714-1R09rohG";
    
    // 🌟 1. ลิงก์ API สำหรับเช็คสิทธิ์และบันทึกลง Sheet (ห้ามแก้)
    const API_URL = "https://script.google.com/macros/s/AKfycbz_famQR3HTZkR8TKAKjZNYfvZ3PpVsJamulajhGmcWg_lJGeyzODMlfl1lITTXJTXB/exec";

    // 🌟 2. ลิงก์ระบบต่างๆ (แก้ลิงก์ Dashboard ให้ถูกต้องที่นี่เพื่อหยุดการวนลูป)
    const SYSTEM_URLS = {
      // 🔴🔴 นำลิงก์หน้า Dashboard ของจริงมาวางตรงนี้ 🔴🔴
      "dashboard": "https://script.google.com/macros/s/ใส่ลิงก์หน้า_Dashboard_ที่นี่/exec", 
      
      "calendar": "https://script.google.com/macros/s/AKfycbw_uIfwhwqGFJL9of6GGAWEgt326i_r-xAD8BCE4kJRQkyO3OtRTKNEV7A9wNTnojp5Hw/exec",
      "repair": "https://script.google.com/macros/s/AKfycbziCgNV-fJ282jjmqvxllOvI8V1WO1nQY7KmdR7KSiUxk_P7Oi4bXVWb8-pGD943siy/exec"
    };

    function onlyOne(checkbox) {
      const checkboxes = document.querySelectorAll('.dept-checkbox');
      checkboxes.forEach((item) => {
        if (item !== checkbox) item.checked = false;
      });
    }

    function getSelectedDept() {
      const checked = document.querySelector('.dept-checkbox:checked');
      return checked ? checked.value : "";
    }

    window.onload = async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const targetApp = urlParams.get('target') || "dashboard";
      const redirectUrl = SYSTEM_URLS[targetApp] || SYSTEM_URLS["dashboard"];

      if (urlParams.get('action') === 'logout') { localStorage.removeItem('sso_user_uid'); }

      const cachedUid = localStorage.getItem('sso_user_uid');
      if (cachedUid) { 
          window.top.location.replace(redirectUrl + "?uid=" + cachedUid); 
          return; 
      }

      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); } else {
          const profile = await liff.getProfile();
          lineProfile = { userId: profile.userId, displayName: profile.displayName, language: liff.getLanguage(), pictureUrl: profile.pictureUrl };
          
          const response = await fetch(`${API_URL}?lineId=${profile.userId}`);
          const result = await response.json();
          
          if (result.isRegistered) { 
            localStorage.setItem('sso_user_uid', profile.userId);
            window.top.location.replace(redirectUrl + "?uid=" + profile.userId);
          } else {
            // เปิดให้แก้ฟอร์มได้เมื่อยังไม่ลงทะเบียน
            ['name', 'surname', 'phone', 'password'].forEach(id => document.getElementById(id).disabled = false);
            document.querySelectorAll('.dept-checkbox').forEach(cb => cb.disabled = false);
            document.getElementById('submitBtn').disabled = false;
            
            document.getElementById('displayName').innerText = "สวัสดีคุณ " + profile.displayName;
            if(profile.pictureUrl) {
              document.getElementById('profileImage').src = profile.pictureUrl;
              document.getElementById('profileImage').style.display = 'block';
              document.getElementById('defaultIcon').style.display = 'none';
            }
          }
        }
      } catch (err) { console.error(err); }
    };

    async function submitForm(event) {
      event.preventDefault();
      
      const department = getSelectedDept();
      if (!department) {
        Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกฝ่ายที่สังกัดด้วยครับ', 'warning');
        return;
      }

      Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      const payload = {
        userId: lineProfile.userId,
        displayName: lineProfile.displayName,
        language: lineProfile.language,
        pictureUrl: lineProfile.pictureUrl,
        name: document.getElementById('name').value,
        surname: document.getElementById('surname').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
        department: department
      };

      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        
        if(result.success) {
          Swal.fire({ icon: 'success', title: 'ลงทะเบียนสำเร็จ!', text: 'กำลังพาท่านเข้าสู่ระบบ', timer: 2000, showConfirmButton: false }).then(() => {
            localStorage.setItem('sso_user_uid', lineProfile.userId);
            const urlParams = new URLSearchParams(window.location.search);
            const targetApp = urlParams.get('target') || "dashboard";
            const redirectUrl = SYSTEM_URLS[targetApp] || SYSTEM_URLS["dashboard"];
            window.top.location.replace(redirectUrl + "?uid=" + lineProfile.userId);
          });
        }
      } catch (e) { Swal.fire('Error', 'ไม่สามารถบันทึกข้อมูลได้', 'error'); }
    }
  </script>
</body>
</html>
