<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนเจ้าหน้าที่ สอ.กวก.</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
    .minimal-card { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    .input-pill { display: flex; align-items: center; padding: 0.75rem 1.25rem; background: #f1f5f9; border-radius: 9999px; border: 2px solid transparent; transition: 0.3s; }
    .input-pill:focus-within { border-color: #3b82f6; background: white; }
    .btn-submit { background: linear-gradient(90deg, #3b82f6, #10b981); color: white; font-weight: bold; border-radius: 9999px; transition: 0.3s; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(59,130,246,0.3); }
    
    .dept-checkbox:checked + label {
      background: linear-gradient(135deg, #38bdf8, #10b981); color: white; border-color: transparent; transform: scale(1.05); box-shadow: 0 5px 12px rgba(56, 189, 248, 0.3);
    }
    .dept-label {
      cursor: pointer; border: 2px solid #f1f5f9; font-size: 0.75rem; padding: 0.6rem 0.25rem; text-align: center; border-radius: 15px; background-color: #fff; color: #64748b; font-weight: 500; transition: all 0.2s ease; display: block;
    }
    .dept-checkbox { display: none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div id="loadingScreen" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-50">
    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 font-medium text-slate-600">กำลังตรวจสอบข้อมูล...</p>
  </div>

  <div id="registerContent" class="minimal-card w-full max-w-xl p-8" style="display: none;">
    <div class="text-center mb-6">
      <img id="profileImage" class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-white shadow-lg object-cover">
      <h2 class="text-2xl font-bold text-slate-800">ลงทะเบียนเข้าใช้งาน</h2>
      <p id="displayName" class="text-slate-500 text-sm"></p>
    </div>
    
    <form onsubmit="submitForm(event)" class="space-y-4">
      <div class="input-pill">
        <i class="fa-solid fa-user-tag text-blue-400 mr-3"></i>
        <input type="text" id="username" placeholder="Username" required class="bg-transparent w-full outline-none text-sm">
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div class="input-pill"><input type="text" id="name" placeholder="ชื่อจริง" required class="bg-transparent w-full outline-none text-sm"></div>
        <div class="input-pill"><input type="text" id="surname" placeholder="นามสกุล" required class="bg-transparent w-full outline-none text-sm"></div>
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div class="input-pill"><i class="fa-solid fa-phone text-blue-400 mr-3"></i><input type="tel" id="phone" placeholder="เบอร์โทร" maxlength="10" required class="bg-transparent w-full outline-none text-sm"></div>
        <div class="input-pill"><i class="fa-solid fa-key text-blue-400 mr-3"></i><input type="password" id="password" placeholder="รหัสผ่าน" required class="bg-transparent w-full outline-none text-sm"></div>
      </div>

      <div class="pt-4 border-t border-slate-100 mt-4">
        <label class="block text-sm font-semibold text-slate-500 mb-3 text-center">เลือกฝ่ายที่สังกัด</label>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <script>
            const depts = [
              "สินเชื่อ", 
              "สมาชิกสัมพันธ์", 
              "อำนวยการ", 
              "บัญชี", 
              "การเงิน", 
              "สารสนเทศ", 
              "ผู้ช่วยผู้จัดการ", 
              "ผู้จัดการ"
            ];
            depts.forEach((dept, index) => {
              document.write(`
                <div>
                  <input type="checkbox" id="dept_${index}" value="${dept}" class="dept-checkbox" onclick="onlyOne(this)">
                  <label for="dept_${index}" class="dept-label shadow-sm">${dept}</label>
                </div>
              `);
            });
          </script>
        </div>
      </div>

      <button type="submit" class="btn-submit w-full py-4 mt-6">ยืนยันลงทะเบียน</button>
    </form>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    let lineProfile = {};
    const LIFF_ID = "2009229714-1R09rohG";
    
    // 🔴 แก้ลิงก์ให้ตรงกับโปรเจกต์ของคุณ
    const API_URL = "https://script.google.com/macros/s/AKfycbz_famQR3HTZkR8TKAKjZNYfvZ3PpVsJamulajhGmcWg_lJGeyzODMlfl1lITTXJTXB/exec";

    function onlyOne(checkbox) {
      document.querySelectorAll('.dept-checkbox').forEach((item) => {
        if (item !== checkbox) item.checked = false;
      });
    }

    function getSelectedDept() {
      const checked = document.querySelector('.dept-checkbox:checked');
      return checked ? checked.value : "";
    }

    window.onload = async () => {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        
        const profile = await liff.getProfile();
        lineProfile = { 
          userId: profile.userId, 
          displayName: profile.displayName, 
          pictureUrl: profile.pictureUrl 
        };
        
        // เช็คว่าเคยลงทะเบียนไว้หรือยัง (เช็คจากทั้ง 2 ชีตแล้ว)
        const res = await fetch(`${API_URL}?lineId=${profile.userId}`).then(r => r.json());
        
        if (res.isRegistered) {
          // ถ้ามีข้อมูลอยู่แล้ว เด้งเข้า Dashboard ทันที ไม่ต้องโชว์หน้าลงทะเบียน
          window.location.replace(API_URL + "?uid=" + profile.userId);
        } else {
          // ถ้ายังไม่มีข้อมูล ค่อยแสดงฟอร์มลงทะเบียน
          document.getElementById('loadingScreen').style.display = 'none';
          document.getElementById('registerContent').style.display = 'block';
          
          if(profile.pictureUrl) {
            document.getElementById('profileImage').src = profile.pictureUrl;
          }
          document.getElementById('displayName').innerText = "สวัสดีคุณ " + profile.displayName;
        }
      } catch (err) {
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อกับ LINE ได้', 'error');
      }
    };

    // 🌟 ยืนยันการลงทะเบียน
    async function submitForm(e) {
      e.preventDefault();

      const department = getSelectedDept();
      if (!department) {
        return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกฝ่ายที่สังกัดด้วยครับ', 'warning');
      }

      Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      const payload = {
        userId: lineProfile.userId, 
        displayName: lineProfile.displayName,
        pictureUrl: lineProfile.pictureUrl, // 🎯 ส่งรูปลง Database ด้วย
        username: document.getElementById('username').value,
        name: document.getElementById('name').value, 
        surname: document.getElementById('surname').value,
        phone: document.getElementById('phone').value, 
        password: document.getElementById('password').value,
        department: department
      };

      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r => r.json());
        
        if(res.success) {
          // ทันทีที่บันทึกเสร็จ (ฐานข้อมูลอัปเดตชัวร์แล้วเพราะมีคำสั่ง flush) พาวิ่งเข้าหน้าหลักเลย
          Swal.fire({ 
            icon: 'success', 
            title: 'สำเร็จ', 
            text: 'ระบบกำลังพาท่านเข้าสู่หน้าหลัก', 
            timer: 1500, 
            showConfirmButton: false 
          }).then(() => {
            window.location.replace(API_URL + "?uid=" + res.uid);
          });
        } else {
          Swal.fire('ผิดพลาด', res.message || 'ไม่สามารถบันทึกข้อมูลได้', 'error');
        }
      } catch (err) {
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่', 'error');
      }
    }
  </script>
</body>
</html>
