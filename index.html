<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนเจ้าหน้าที่ สอ.กวก.</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { 
      font-family: 'Kanit', sans-serif; 
      background-color: #f0f9ff;
      background-image: radial-gradient(#e0f2fe 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .minimal-card {
      background: #ffffff;
      border: 2px solid #f1f5f9;
      border-radius: 40px;
      box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.05);
    }

    .input-pill {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0.65rem 1.25rem;
      background-color: #f8fafc;
      border: 2px solid #f1f5f9;
      border-radius: 9999px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-pill:focus-within {
      border-color: #38bdf8;
      background-color: #ffffff;
      box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.15);
      transform: translateY(-2px);
    }

    .input-pill i { transition: all 0.3s ease; }
    .input-pill:focus-within i { color: #0ea5e9; transform: scale(1.15); }

    .dept-checkbox:checked + label {
      background: linear-gradient(135deg, #38bdf8, #10b981);
      color: white;
      border-color: transparent;
      transform: scale(1.05);
      box-shadow: 0 5px 12px rgba(56, 189, 248, 0.3);
    }

    .dept-label {
      cursor: pointer;
      border: 2px solid #f1f5f9;
      font-size: 0.75rem;
      padding: 0.6rem 0.25rem;
      text-align: center;
      border-radius: 15px;
      background-color: #fff;
      color: #64748b;
      font-weight: 500;
      transition: all 0.2s ease;
      display: block;
    }

    .dept-checkbox { display: none; }

    .btn-submit {
      background: linear-gradient(to right, #0ea5e9, #10b981);
      transition: all 0.3s ease;
    }
    .btn-submit:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
    }

    .line-profile-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* --- Loading Screen Styles --- */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background-color: #f0f9ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .spinner {
      border: 4px solid rgba(56, 189, 248, 0.2);
      border-left-color: #0ea5e9;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>

<body>

  <div id="loadingScreen">
    <div class="spinner mb-6"></div>
    <h2 class="text-xl font-bold text-slate-700">กำลังตรวจสอบสิทธิ์การเข้าถึง...</h2>
    <p class="text-slate-400 text-sm mt-2">กรุณารอสักครู่</p>
  </div>

  <div id="mainContent" class="min-h-screen flex items-center justify-center p-4" style="display: none;">
    <div class="minimal-card w-full max-w-2xl p-8 md:p-12 my-4">
      
      <div class="flex flex-col md:flex-row items-center gap-6 mb-8 border-b border-slate-50 pb-8 text-center md:text-left relative">
        <div class="relative shrink-0">
          <div class="p-1 bg-gradient-to-tr from-sky-400 to-emerald-400 rounded-full shadow-md" id="imgWrapper">
            <img id="profileImage" class="line-profile-img">
          </div>
        </div>
        <div>
          <h2 class="text-2xl font-bold text-slate-700">ลงทะเบียนเจ้าหน้าที่ สอ.กวก.</h2>
          <p id="displayName" class="text-slate-400 font-medium text-sm mt-1">กรุณาระบุข้อมูลส่วนตัวเพื่อเข้าใช้งานระบบ</p>
        </div>
      </div>

      <form id="regForm" onsubmit="submitForm(event)" class="space-y-6">
        
        <div class="flex items-center gap-3">
          <label class="w-16 text-sm font-semibold text-slate-500">Username</label>
          <div class="input-pill">
            <i class="fa-solid fa-user text-sky-300 mr-3"></i>
            <input type="text" id="username" required placeholder="ระบุ Username สำหรับเข้าระบบ" class="bg-transparent w-full outline-none text-sm text-slate-600">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex items-center gap-3">
            <label class="w-16 text-sm font-semibold text-slate-500">ชื่อจริง</label>
            <div class="input-pill">
              <i class="fa-regular fa-face-smile text-sky-300 mr-3"></i>
              <input type="text" id="name" required placeholder="ระบุชื่อจริง" class="bg-transparent w-full outline-none text-sm text-slate-600">
            </div>
          </div>
          <div class="flex items-center gap-3">
            <label class="w-16 md:w-14 text-sm font-semibold text-slate-500">นามสกุล</label>
            <div class="input-pill">
              <i class="fa-regular fa-star text-sky-300 mr-3"></i>
              <input type="text" id="surname" required placeholder="ระบุนามสกุล" class="bg-transparent w-full outline-none text-sm text-slate-600">
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex items-center gap-3">
            <label class="w-16 text-sm font-semibold text-slate-500">โทรศัพท์</label>
            <div class="input-pill">
              <i class="fa-solid fa-phone text-sky-300 mr-3"></i>
              <input type="tel" id="phone" required placeholder="08XXXXXXXX" maxlength="10" class="bg-transparent w-full outline-none text-sm text-slate-600">
            </div>
          </div>
          <div class="flex items-center gap-3">
            <label class="w-16 md:w-14 text-sm font-semibold text-slate-500">Pass</label>
            <div class="input-pill">
              <i class="fa-solid fa-lock text-sky-300 mr-3"></i>
              <input type="password" id="password" required placeholder="Password" class="bg-transparent w-full outline-none text-sm text-slate-600">
            </div>
          </div>
        </div>

        <div class="pt-4 border-t border-slate-50 mt-4">
          <div class="flex flex-col md:flex-row gap-4">
            <label class="w-full md:w-16 text-sm font-semibold text-slate-500 md:mt-2">ฝ่าย</label>
            <div class="flex-1">
              <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                <script>
                  const depts = ["ฝ่ายอำนวยการ", "สินเชื่อ", "การเงิน", "บัญชี", "สมาชิกสัมพันธ์", "สารสนเทศ", "ผู้ช่วยผู้จัดการ", "ผู้จัดการ"];
                  depts.forEach((dept, index) => {
                    document.write(`
                      <div>
                        <input type="checkbox" id="dept_${index}" value="${dept}" class="dept-checkbox" onclick="onlyOne(this)">
                        <label for="dept_${index}" class="dept-label shadow-sm">${dept}</label>
                      </div>
                    `);
                  });
                </script>
              </div>
            </div>
          </div>
        </div>

        <div class="pt-6">
          <button type="submit" id="submitBtn" class="btn-submit w-full text-white font-bold py-4 rounded-full text-lg shadow-lg flex items-center justify-center gap-2">
            <span>ยืนยันข้อมูลเจ้าหน้าที่</span>
            <i class="fa-solid fa-check-circle"></i>
          </button>
        </div>

        <div class="pt-8 border-t border-slate-50 text-center">
          <p class="text-[11px] text-slate-400 font-medium tracking-wide uppercase">
            2026 ฝ่ายสารสนเทศ | สหกรณ์ออมทรัพย์กรมวิชาการเกษตรจำกัด
          </p>
        </div>

      </form>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    let lineProfile = {};
    const LIFF_ID = "2009229714-1R09rohG";
    
    // 🔴 1. API_URL = ลิงก์ของระบบฐานข้อมูลกลาง (สำหรับเช็คและบันทึก)
    const API_URL = "https://script.google.com/macros/s/AKfycbz_famQR3HTZkR8TKAKjZNYfvZ3PpVsJamulajhGmcWg_lJGeyzODMlfl1lITTXJTXB/exec";

    // 🔴 2. DASHBOARD_URL = ลิงก์ของระบบรวม ที่จะวิ่งไปถ้าลงทะเบียนแล้ว (ระวัง: ห้ามนำลิงก์ API_URL หรือ GitHub มาใส่เด็ดขาด เพราะจะวนลูป)
    const DASHBOARD_URL = "https://script.google.com/macros/s/AKfycbz_famQR3HTZkR8TKAKjZNYfvZ3PpVsJamulajhGmcWg_lJGeyzODMlfl1lITTXJTXB/exec";

    function onlyOne(checkbox) {
      const checkboxes = document.querySelectorAll('.dept-checkbox');
      checkboxes.forEach((item) => {
        if (item !== checkbox) item.checked = false;
      });
    }

    function getSelectedDept() {
      const checked = document.querySelector('.dept-checkbox:checked');
      return checked ? checked.value : "";
    }

    // ทำงานทันทีเมื่อเปิดลิงก์ LIFF
    window.onload = async function() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) { 
          liff.login(); 
          return;
        } 
        
        // ดึงข้อมูล LINE
        const profile = await liff.getProfile();
        lineProfile = { 
          userId: profile.userId, 
          displayName: profile.displayName, 
          pictureUrl: profile.pictureUrl 
        };
        
        // ยิงไปถาม Database กลาง ว่าคนนี้เคยลงทะเบียนหรือยัง
        const response = await fetch(`${API_URL}?lineId=${profile.userId}`);
        const result = await response.json();
        
        if (result.isRegistered) { 
          // 🎯 ถ้าเคยลงทะเบียนแล้ว -> วิ่งไป Dashboard ทันที
          window.location.replace(DASHBOARD_URL + "?uid=" + profile.userId);
        } else {
          // 🎯 ถ้ายังไม่เคยลงทะเบียน -> ซ่อนหน้าโหลด และโชว์หน้าฟอร์ม
          document.getElementById('loadingScreen').style.display = 'none';
          document.getElementById('mainContent').style.display = 'flex';
          
          document.getElementById('displayName').innerText = "สวัสดีคุณ " + profile.displayName;
          if(profile.pictureUrl) {
            const imgEl = document.getElementById('profileImage');
            imgEl.src = profile.pictureUrl;
            imgEl.style.display = 'block';
          }
        }
      } catch (err) { 
        console.error(err);
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อกับ LINE ได้', 'error');
      }
    };

    async function submitForm(event) {
      event.preventDefault();
      
      const department = getSelectedDept();
      if (!department) {
        Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกฝ่ายที่สังกัดด้วยครับ', 'warning');
        return;
      }

      Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      const payload = {
        userId: lineProfile.userId,
        displayName: lineProfile.displayName,
        username: document.getElementById('username').value, // 🎯 ดึงค่า username จากฟอร์มแทน
        pictureUrl: lineProfile.pictureUrl,
        name: document.getElementById('name').value,
        surname: document.getElementById('surname').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
        department: department
      };

      try {
        // ยิงข้อมูลไปบันทึก
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        
        if(result.success) {
          Swal.fire({ 
            icon: 'success', 
            title: 'ลงทะเบียนสำเร็จ!', 
            text: 'ระบบกำลังพาท่านเข้าสู่หน้าแดชบอร์ด', 
            timer: 2000, 
            showConfirmButton: false 
          }).then(() => {
            // บันทึกเสร็จ -> วิ่งไป Dashboard ทันที
            window.location.replace(DASHBOARD_URL + "?uid=" + lineProfile.userId);
          });
        }
      } catch (e) { 
        Swal.fire('Error', 'ไม่สามารถบันทึกข้อมูลได้', 'error'); 
      }
    }
  </script>
</body>
</html>
