<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนเจ้าหน้าที่ สอ.กวก.</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* 🎯 ปรับแต่งพื้นหลังเป็นโทนสีพาสเทล Lavender/Periwinkle */
    body { 
        font-family: 'Kanit', sans-serif; 
        background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        min-height: 100vh;
    }
    
    /* 🎯 เปลี่ยนการ์ดเป็นแบบกระจกใส (Glassmorphism) */
    .minimal-card { 
        background: rgba(255, 255, 255, 0.95); 
        backdrop-filter: blur(12px); 
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 1); 
        border-radius: 2.5rem; 
        box-shadow: 0 20px 40px -10px rgba(71, 85, 105, 0.15); 
    }
    
    /* 🎯 ปรับแต่งช่องกรอกข้อมูลให้ดูโค้งมนและสะอาดตาขึ้น */
    .input-pill { 
        display: flex; align-items: center; padding: 0.85rem 1.25rem; 
        background: rgba(248, 250, 252, 0.8); border-radius: 1rem; 
        border: 1px solid #e2e8f0; transition: 0.3s; 
    }
    .input-pill:focus-within { 
        border-color: #3b82f6; background: white; 
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); 
    }
    
    /* 🎯 ปุ่มยืนยันแบบมีมิติ */
    .btn-submit { 
        background: linear-gradient(to right, #2563eb, #4f46e5); 
        color: white; font-weight: bold; border-radius: 1rem; transition: all 0.3s; 
    }
    .btn-submit:hover { 
        transform: translateY(-2px); 
        box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); 
    }
    
    /* 🎯 ปุ่มเลือกฝ่าย */
    .dept-checkbox:checked + label {
      background: #2563eb; color: white; border-color: #2563eb; 
      transform: scale(1.02); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
    }
    .dept-label {
      cursor: pointer; border: 1px solid #cbd5e1; font-size: 0.75rem; 
      padding: 0.6rem 0.25rem; text-align: center; border-radius: 0.75rem; 
      background-color: rgba(255,255,255,0.8); color: #64748b; font-weight: 500; 
      transition: all 0.2s ease; display: block;
    }
    .dept-checkbox { display: none; }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div id="loadingScreen" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-50">
    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <p class="mt-4 font-medium text-slate-600">กำลังตรวจสอบข้อมูล...</p>
  </div>

  <div id="registerContent" class="minimal-card w-full max-w-xl p-8" style="display: none;">
    <div class="text-center mb-6">
      <div class="relative w-24 h-24 mx-auto mb-4">
          <img id="profileImage" class="w-24 h-24 rounded-full border-4 border-white shadow-md object-cover bg-slate-100 mx-auto">
      </div>
      <h2 class="text-2xl font-bold text-slate-800">ลงทะเบียนเข้าใช้งาน</h2>
      <p id="displayName" class="text-slate-500 text-sm mt-1"></p>
    </div>
    
    <form onsubmit="submitForm(event)" class="space-y-4">
      
      <div class="grid grid-cols-2 gap-4">
        <div class="input-pill">
          <i class="fa-regular fa-user text-blue-400 mr-3"></i>
          <input type="text" id="name" placeholder="ชื่อจริง" required class="bg-transparent w-full outline-none text-sm text-slate-700">
        </div>
        <div class="input-pill">
          <i class="fa-regular fa-address-card text-blue-400 mr-3"></i>
          <input type="text" id="surname" placeholder="นามสกุล" required class="bg-transparent w-full outline-none text-sm text-slate-700">
        </div>
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div class="input-pill">
          <i class="fa-solid fa-user-tag text-blue-400 mr-3"></i>
          <input type="text" id="username" placeholder="Username" required class="bg-transparent w-full outline-none text-sm text-slate-700">
        </div>
        <div class="input-pill">
          <i class="fa-solid fa-key text-blue-400 mr-3"></i>
          <input type="password" id="password" placeholder="รหัสผ่าน" required class="bg-transparent w-full outline-none text-sm text-slate-700">
        </div>
      </div>

      <div class="input-pill">
        <i class="fa-solid fa-phone text-blue-400 mr-3"></i>
        <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์ (08XXXXXXXX)" maxlength="10" required class="bg-transparent w-full outline-none text-sm text-slate-700">
      </div>

      <div class="pt-4 border-t border-slate-200 mt-5">
        <label class="block text-sm font-bold text-slate-500 mb-3 text-center uppercase tracking-wide">เลือกฝ่ายที่สังกัด</label>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <script>
            const depts = [
              "ฝ่ายอำนวยการ", 
              "ฝ่ายสินเชื่อ", 
              "ฝ่ายการเงิน", 
              "ฝ่ายบัญชี", 
              "ฝ่ายสมาชิกสัมพันธ์", 
              "ฝ่ายสารสนเทศ", 
              "ผู้ช่วยผู้จัดการ", 
              "ผู้จัดการ"
            ];
            depts.forEach((dept, index) => {
              document.write(`
                <div>
                  <input type="checkbox" id="dept_${index}" value="${dept}" class="dept-checkbox" onclick="onlyOne(this)">
                  <label for="dept_${index}" class="dept-label shadow-sm">${dept}</label>
                </div>
              `);
            });
          </script>
        </div>
      </div>

      <button type="submit" class="btn-submit w-full py-3.5 mt-6 shadow-lg">ยืนยันลงทะเบียน</button>
    </form>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // 🎯 โค้ดส่วนลอจิกของคุณทั้งหมด อยู่ครบ 100%
    let lineProfile = {};
    const LIFF_ID = "2009229714-1R09rohG";
    
    const API_URL = "https://script.google.com/macros/s/AKfycbz_famQR3HTZkR8TKAKjZNYfvZ3PpVsJamulajhGmcWg_lJGeyzODMlfl1lITTXJTXB/exec";

    function onlyOne(checkbox) {
      document.querySelectorAll('.dept-checkbox').forEach((item) => {
        if (item !== checkbox) item.checked = false;
      });
    }

    function getSelectedDept() {
      const checked = document.querySelector('.dept-checkbox:checked');
      return checked ? checked.value : "";
    }

    window.onload = async () => {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        
        const profile = await liff.getProfile();
        lineProfile = { 
          userId: profile.userId, 
          displayName: profile.displayName, 
          pictureUrl: profile.pictureUrl 
        };
        
        const res = await fetch(`${API_URL}?lineId=${profile.userId}`).then(r => r.json());
        
        if (res.isRegistered) {
          window.location.replace(API_URL + "?uid=" + profile.userId);
        } else {
          document.getElementById('loadingScreen').style.display = 'none';
          document.getElementById('registerContent').style.display = 'block';
          
          if(profile.pictureUrl) {
            document.getElementById('profileImage').src = profile.pictureUrl;
          }
          document.getElementById('displayName').innerText = "สวัสดีคุณ " + profile.displayName;
        }
      } catch (err) {
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อกับ LINE ได้', 'error');
      }
    };

    async function submitForm(e) {
      e.preventDefault();

      const department = getSelectedDept();
      if (!department) {
        return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกฝ่ายที่สังกัดด้วยครับ', 'warning');
      }

      Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      const payload = {
        userId: lineProfile.userId, 
        displayName: lineProfile.displayName,
        pictureUrl: lineProfile.pictureUrl,
        username: document.getElementById('username').value,
        name: document.getElementById('name').value, 
        surname: document.getElementById('surname').value,
        phone: document.getElementById('phone').value, 
        password: document.getElementById('password').value,
        department: department
      };

      try {
        // 🎯 เติม Headers: text/plain ให้เพื่อหลบปัญหา CORS Error ที่คุณเพิ่งเจอครับ
        const res = await fetch(API_URL, { 
            method: 'POST', 
            headers: {
                'Content-Type': 'text/plain;charset=utf-8'
            },
            body: JSON.stringify(payload) 
        }).then(r => r.json());
        
        if(res.success) {
          Swal.fire({ 
            icon: 'success', 
            title: 'สำเร็จ', 
            text: 'ระบบกำลังพาท่านเข้าสู่หน้าหลัก', 
            timer: 1500, 
            showConfirmButton: false 
          }).then(() => {
            window.location.replace(API_URL + "?uid=" + res.uid);
          });
        } else {
          Swal.fire('ผิดพลาด', res.message || 'ไม่สามารถบันทึกข้อมูลได้', 'error');
        }
      } catch (err) {
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่', 'error');
      }
    }
  </script>
</body>
</html>
