<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนเข้าใช้งาน สอ.กวก.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(12px); 
            box-shadow: 0 20px 40px -10px rgba(71, 85, 105, 0.15); 
            border: 1px solid rgba(255, 255, 255, 1); 
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card rounded-[2.5rem] p-8 relative z-10 text-center">
        <div class="relative w-24 h-24 mx-auto mb-4">
            <img id="profileImage" src="https://via.placeholder.com/150" class="w-24 h-24 rounded-full border-4 border-white shadow-md object-cover bg-slate-100">
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-1">ลงทะเบียนเข้าใช้งาน</h2>
        <p class="text-slate-500 text-sm mb-6" id="profileName">กำลังโหลดข้อมูล LINE...</p>

        <form id="registerForm" class="space-y-4 text-left">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ชื่อจริง</label>
                    <input type="text" id="name" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-slate-50 focus:bg-white transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">นามสกุล</label>
                    <input type="text" id="surname" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-slate-50 focus:bg-white transition-colors">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">เบอร์โทรศัพท์ (10 หลัก)</label>
                <input type="tel" id="phone" required pattern="[0-9]{10}" placeholder="08XXXXXXXX" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-slate-50 focus:bg-white transition-colors">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-2">สังกัด / ฝ่าย</label>
                <div class="grid grid-cols-2 gap-2 text-center">
                    <label class="cursor-pointer">
                        <input type="radio" name="department" value="ฝ่ายสารสนเทศ" class="peer sr-only" required>
                        <div class="rounded-xl border border-slate-200 px-2 py-2 text-[11px] font-bold text-slate-500 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 transition-all hover:bg-slate-50">ฝ่ายสารสนเทศ</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="department" value="ฝ่ายสมาชิกสัมพันธ์" class="peer sr-only">
                        <div class="rounded-xl border border-slate-200 px-2 py-2 text-[11px] font-bold text-slate-500 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 transition-all hover:bg-slate-50">ฝ่ายสมาชิกสัมพันธ์</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="department" value="ฝ่ายสินเชื่อ" class="peer sr-only">
                        <div class="rounded-xl border border-slate-200 px-2 py-2 text-[11px] font-bold text-slate-500 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 transition-all hover:bg-slate-50">ฝ่ายสินเชื่อ</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="department" value="ผู้ช่วยผู้จัดการ" class="peer sr-only">
                        <div class="rounded-xl border border-slate-200 px-2 py-2 text-[11px] font-bold text-slate-500 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 transition-all hover:bg-slate-50">ผู้ช่วยผู้จัดการ</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="department" value="ผู้จัดการ" class="peer sr-only">
                        <div class="rounded-xl border border-slate-200 px-2 py-2 text-[11px] font-bold text-slate-500 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 transition-all hover:bg-slate-50">ผู้จัดการ</div>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1 mt-2">กำหนดรหัสผ่าน (PIN 6 หลัก)</label>
                <input type="password" id="password" required pattern="[0-9]{6}" placeholder="******" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-center tracking-[0.5em] bg-slate-50 focus:bg-white transition-colors">
            </div>

            <button type="submit" id="submitBtn" class="w-full mt-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transform transition hover:-translate-y-1">
                ยืนยันลงทะเบียน
            </button>
        </form>
    </div>

    <script>
        // 🎯 ใส่ URL ของ Google Apps Script ที่คุณ Deploy ไว้ล่าสุด
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_famQR3HTZkR8TKAKjZNYfvZ3PpVsJamulajhGmcWg_lJGeyzODMlfl1lITTXJTXB/exec";
        const LIFF_ID = "2009229714-1R09rohG";
        let userProfile = {};

        // 1. เริ่มทำงาน ดึงข้อมูล LINE
        document.addEventListener("DOMContentLoaded", async function() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    userProfile = await liff.getProfile();
                    document.getElementById('profileImage').src = userProfile.pictureUrl || "https://via.placeholder.com/150";
                    document.getElementById('profileName').innerText = userProfile.displayName;
                    
                    // เช็คว่าผู้ใช้นี้เคยลงทะเบียนหรือยัง?
                    checkRegistration(userProfile.userId);
                } else {
                    liff.login();
                }
            } catch (err) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อ LINE ได้ กรุณาเข้าผ่านแอปพลิเคชัน', 'error');
            }
        });

        // 2. ฟังก์ชันตรวจสอบการลงทะเบียน
        function checkRegistration(userId) {
            Swal.fire({ title: 'กำลังตรวจสอบข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            
            fetch(SCRIPT_URL + "?lineId=" + userId)
                .then(res => res.json())
                .then(data => {
                    if (data.isRegistered) {
                        // ถ้าเคยลงทะเบียนแล้ว ให้โยนไปหน้า Dashboard ทันทีเลย
                        window.location.href = SCRIPT_URL + "?uid=" + userId;
                    } else {
                        // ถ้ายังไม่เคย ให้ปิด Loading แล้วรอให้กรอกฟอร์ม
                        Swal.close();
                    }
                })
                .catch(err => {
                    Swal.close();
                });
        }

        // 3. ฟังก์ชันตอนกดปุ่มยืนยันการลงทะเบียน
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!userProfile.userId) {
                Swal.fire('ข้อผิดพลาด', 'ไม่พบข้อมูล LINE ID กรุณาเข้าสู่ระบบใหม่', 'error');
                return;
            }

            // รวบรวมข้อมูลที่กรอก
            const selectedDept = document.querySelector('input[name="department"]:checked').value;
            const payload = {
                userId: userProfile.userId,
                displayName: userProfile.displayName,
                username: userProfile.displayName,
                pictureUrl: userProfile.pictureUrl || "https://via.placeholder.com/150",
                name: document.getElementById('name').value,
                surname: document.getElementById('surname').value,
                phone: document.getElementById('phone').value,
                department: selectedDept,
                password: document.getElementById('password').value
            };

            Swal.fire({
                title: 'กำลังบันทึกข้อมูล...',
                text: 'กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            // 🎯 กุญแจสำคัญ: ส่งแบบ text/plain เพื่อหลบระบบป้องกัน CORS ของเบราว์เซอร์
            fetch(SCRIPT_URL, {
                method: 'POST',
                redirect: 'follow',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8' 
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'ลงทะเบียนสำเร็จ!',
                        text: 'ระบบกำลังพาท่านเข้าสู่หน้าหลัก',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        // พาผู้ใช้เด้งเข้าสู่หน้า Dashboard ที่เราทำแยกฝ่ายไว้เมื่อสักครู่
                        window.location.href = SCRIPT_URL + "?uid=" + data.uid;
                    });
                } else {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้: ' + (data.error || 'ข้อผิดพลาดระบบ'), 'error');
                }
            })
            .catch(error => {
                Swal.fire('ข้อผิดพลาด', 'การเชื่อมต่อขัดข้อง กรุณาลองใหม่อีกครั้ง', 'error');
                console.error("Fetch Error:", error);
            });
        });
    </script>
</body>
</html>
