<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนสมาชิก</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #ffffff; }
    .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e5e7eb; border-radius: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #22c55e; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #22c55e; display:none; }
  </style>
</head>
<body>
  <div class="container">
    <img id="profileImage" class="profile-img" src="">
    <h3 id="displayName">กำลังโหลดข้อมูล...</h3>
    <form onsubmit="submitForm(event)">
      <input type="text" id="name" required placeholder="ชื่อจริง" disabled>
      <input type="text" id="surname" required placeholder="นามสกุล" disabled>
      <input type="tel" id="phone" required placeholder="เบอร์โทรศัพท์" maxlength="10" disabled>
      <button type="submit" id="submitBtn" disabled>ลงทะเบียน</button>
    </form>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    let lineProfile = {};
    const LIFF_ID = "2009229714-1R09rohG";
    const API_URL = "https://script.google.com/macros/s/AKfycbz_famQR3HTZkR8TKAKjZNYfvZ3PpVsJamulajhGmcWg_lJGeyzODMlfl1lITTXJTXB/exec";

    // 🌟 ศูนย์รวมลิงก์ระบบทั้งหมด (จัดการง่ายขึ้น) 🌟
    const SYSTEM_URLS = {
      "dashboard": API_URL, 
      "calendar": "https://script.google.com/macros/s/AKfycbz_uIfwhwqGFJL9of6GGAWEgt326i_r-xAD8BCE4kJRQkyO3OtRTKNEV7A9wNTnojp5Hw/exec",
      "repair": "https://script.google.com/macros/s/AKfycbziCgNV-fJ282jjmqvxllOvI8V1WO1nQY7KmdR7KSiUxk_P7Oi4bXVWb8-pGD943siy/exec" // <--- นำลิงก์ระบบแจ้งซ่อมมาใส่ตรงนี้ได้เลย
    };

    window.onload = async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const targetApp = urlParams.get('target') || "dashboard";
      const action = urlParams.get('action');
      
      // หา URL เป้าหมาย ถ้าพิมพ์เป้าหมายผิดจะเด้งกลับไปที่ dashboard
      const redirectUrl = SYSTEM_URLS[targetApp] ? SYSTEM_URLS[targetApp] : SYSTEM_URLS["dashboard"];

      // 1. ตรวจสอบว่ามีคำสั่งให้ออกจากระบบ (Logout) หรือไม่
      if (action === 'logout') {
          localStorage.removeItem('sso_user_uid');
          window.history.replaceState({}, document.title, window.location.pathname);
      }

      // 2. ✨ ระบบตรวจสอบ Cache: ถ้าเคยลงทะเบียน/ล็อกอินแล้ว ทะลุเข้าเว็บเป้าหมายทันที ✨
      const cachedUid = localStorage.getItem('sso_user_uid');
      if (cachedUid) {
          window.top.location.replace(redirectUrl + "?uid=" + cachedUid);
          return; // หยุดการทำงานส่วนที่เหลือ ไม่ต้องโหลด LIFF 
      }

      // 3. ถ้าไม่มี Cache (เข้าครั้งแรก) ให้เชื่อมต่อ LIFF ตามปกติ
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { 
            liff.login({ redirectUri: window.location.href }); 
        } else {
          const profile = await liff.getProfile();
          lineProfile = { userId: profile.userId, displayName: profile.displayName, language: liff.getLanguage(), pictureUrl: profile.pictureUrl };
          const response = await fetch(`${API_URL}?lineId=${profile.userId}`);
          const result = await response.json();
          
          if (result.isRegistered) { 
             // ลงทะเบียนไว้แล้ว -> จำรหัสใส่ Cache แล้วส่งไปเป้าหมาย
             localStorage.setItem('sso_user_uid', profile.userId);
             window.top.location.replace(redirectUrl + "?uid=" + profile.userId);
          } else {
             // ปลดล็อกฟอร์มให้ลงทะเบียน
            ['name', 'surname', 'phone'].forEach(id => { document.getElementById(id).disabled = false; });
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('displayName').innerText = profile.displayName;
            if(profile.pictureUrl) { document.getElementById('profileImage').src = profile.pictureUrl; document.getElementById('profileImage').style.display = 'inline-block'; }
          }
        }
      } catch (err) { console.error(err); }
    };

    async function submitForm(event) {
      event.preventDefault();
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      const payload = {
        userId: lineProfile.userId, displayName: lineProfile.displayName, language: lineProfile.language, pictureUrl: lineProfile.pictureUrl,
        name: document.getElementById('name').value, surname: document.getElementById('surname').value, phone: document.getElementById('phone').value, status: "Active"
      };
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if(result.success) {
          Swal.fire({ icon: 'success', title: 'สำเร็จ!', timer: 1500, showConfirmButton: false })
          .then(() => {
              // เมื่อบันทึกสำเร็จ -> จำรหัสใส่ Cache แล้วส่งไปเป้าหมาย
              localStorage.setItem('sso_user_uid', lineProfile.userId);
              const urlParams = new URLSearchParams(window.location.search);
              const targetApp = urlParams.get('target') || "dashboard";
              const redirectUrl = SYSTEM_URLS[targetApp] ? SYSTEM_URLS[targetApp] : SYSTEM_URLS["dashboard"];
              
              window.top.location.replace(redirectUrl + "?uid=" + lineProfile.userId);
          });
        }
      } catch (e) { console.error(e); }
    }
  </script>
</body>
</html>
